<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bash continue - Step by Step</title>
<style>
  :root {
    --font-sans: system-ui, -apple-system, sans-serif;
    --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f0;
    --bg-info: #E6F1FB;
    --bg-success: #EAF3DE;
    --text-primary: #1a1a1a;
    --text-secondary: #6b6b68;
    --text-info: #185FA5;
    --text-success: #3B6D11;
    --border-tertiary: rgba(0,0,0,0.15);
    --border-info: #85B7EB;
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1a1a1a;
      --bg-secondary: #2c2c2a;
      --bg-info: #042C53;
      --bg-success: #173404;
      --text-primary: #e8e6df;
      --text-secondary: #9c9a92;
      --text-info: #85B7EB;
      --text-success: #97C459;
      --border-tertiary: rgba(255,255,255,0.15);
      --border-info: #378ADD;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-sans); padding: 24px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-size: 18px; font-weight: 500; margin: 0 0 16px; }
  .scenario-tabs { display: flex; gap: 6px; margin: 0 0 14px; flex-wrap: wrap; }
  .tab {
    font-size: 13px; padding: 5px 12px; cursor: pointer;
    border-radius: var(--radius-md);
    background: var(--bg-secondary);
    color: var(--text-secondary);
    border: 0.5px solid var(--border-tertiary);
    font-family: var(--font-sans); transition: all .15s;
  }
  .tab.active { background: var(--bg-info); color: var(--text-info); border-color: var(--border-info); }
  .code-block {
    background: var(--bg-secondary);
    border: 0.5px solid var(--border-tertiary);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    font-family: var(--font-mono); font-size: 13px; line-height: 1.75;
    color: var(--text-primary); margin: 0 0 14px;
    overflow-x: auto; white-space: pre;
  }
  .controls { display: flex; gap: 10px; margin: 0 0 14px; align-items: center; flex-wrap: wrap; }
  .controls button {
    font-size: 13px; padding: 7px 18px; cursor: pointer;
    border-radius: var(--radius-md);
    font-family: var(--font-sans); transition: background .15s, transform .1s;
  }
  .controls button:active { transform: scale(0.97); }
  .btn-next { background: var(--bg-info); color: var(--text-info); border: 0.5px solid var(--border-info); font-weight: 500; }
  .btn-next:disabled { opacity: 0.4; cursor: default; }
  .btn-reset { background: var(--bg-secondary); color: var(--text-secondary); border: 0.5px solid var(--border-tertiary); }
  .status-msg {
    font-size: 13px; color: var(--text-secondary);
    padding: 4px 10px; border-radius: var(--radius-md);
    background: var(--bg-secondary);
    min-height: 28px; display: flex; align-items: center;
  }
  .status-msg.s-continue { background: #FAEEDA; color: #854F0B; }
  .status-msg.s-print { background: #E1F5EE; color: #0F6E56; }
  .status-msg.s-break { background: #FCEBEB; color: #A32D2D; }
  .status-msg.s-done { background: var(--bg-success); color: var(--text-success); }
  @media (prefers-color-scheme: dark) {
    .status-msg.s-continue { background: #412402; color: #FAC775; }
    .status-msg.s-print { background: #085041; color: #9FE1CB; }
    .status-msg.s-break { background: #501313; color: #F7C1C1; }
  }
  .iter-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin: 0 0 12px; }
  .iter-box {
    width: 40px; height: 40px; border-radius: var(--radius-md);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 500;
    border: 0.5px solid var(--border-tertiary);
    background: var(--bg-secondary); color: var(--text-secondary);
    transition: all .3s; font-family: var(--font-mono);
  }
  .iter-box.printed { background: #E1F5EE; color: #0F6E56; border-color: #5DCAA5; }
  .iter-box.continued { background: #FAEEDA; color: #854F0B; border-color: #FAC775; }
  .iter-box.broken { background: #FCEBEB; color: #A32D2D; border-color: #F09595; }
  .iter-box.active { transform: scale(1.18); box-shadow: 0 0 0 2.5px var(--border-info); }
  .iter-box.unreached { opacity: 0.2; }
  @media (prefers-color-scheme: dark) {
    .iter-box.printed { background: #085041; color: #9FE1CB; border-color: #1D9E75; }
    .iter-box.continued { background: #412402; color: #FAC775; border-color: #BA7517; }
    .iter-box.broken { background: #501313; color: #F7C1C1; border-color: #E24B4A; }
  }
  .output-box {
    background: var(--bg-secondary);
    border: 0.5px solid var(--border-tertiary);
    border-radius: var(--radius-md);
    padding: 10px 14px; font-family: var(--font-mono); font-size: 13px;
    color: var(--text-primary); min-height: 34px; margin: 10px 0 0; line-height: 1.6;
  }
  .legend { display: flex; gap: 14px; margin: 12px 0 0; font-size: 12px; color: var(--text-secondary); flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
  .counter { font-size: 13px; color: var(--text-secondary); margin: 8px 0 0; }
</style>

<div class="wrap">
  <h1>Bash: continue vs break — step by step</h1>

  <div class="scenario-tabs">
    <div class="tab active" onclick="setScenario(0)">continue only</div>
    <div class="tab" onclick="setScenario(1)">continue + break</div>
    <div class="tab" onclick="setScenario(2)">set 1 (ans: 7)</div>
    <div class="tab" onclick="setScenario(3)">set 2 (ans: 4)</div>
  </div>

  <div id="code-area" class="code-block"></div>

  <div class="controls">
    <button class="btn-next" id="btn-next" onclick="nextStep()">Next step</button>
    <button class="btn-reset" onclick="resetAll()">Reset</button>
    <div id="status" class="status-msg">Click "Next step" to start</div>
  </div>

  <div id="iter-area" class="iter-row"></div>

  <div style="font-size:13px;color:var(--text-secondary);margin:10px 0 2px;">Output:</div>
  <div id="output" class="output-box"></div>
  <div id="counter" class="counter"></div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#5DCAA5;"></div> echo (printed)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#FAC775;"></div> continue (skipped)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#F09595;"></div> break (loop ended)</div>
  </div>
</div>

<script>
const scenarios = [
  {
    code: `for i in {1..7}; do\n  if ((i % 3 == 0)); then\n    continue\n  fi\n  echo "i = $i"\ndone`,
    range: [1,7],
    run(i) {
      if (i % 3 === 0) return { action:"continued", msg:`i=${i} → i%3==0 true → continue! Baaki skip, next iteration.` };
      return { action:"printed", out:`i = ${i}`, msg:`i=${i} → i%3==0 false → echo prints "i = ${i}"` };
    }
  },
  {
    code: `for i in {1..7}; do\n  if ((i % 3 == 0)); then\n    continue\n  fi\n  if ((i > 5)); then\n    break\n  fi\n  echo "i = $i"\ndone`,
    range: [1,7],
    run(i) {
      if (i % 3 === 0) return { action:"continued", msg:`i=${i} → i%3==0 true → continue! Next iteration.` };
      if (i > 5) return { action:"broken", msg:`i=${i} → i>5 true → break! Poora loop khatam.` };
      return { action:"printed", out:`i = ${i}`, msg:`i=${i} → dono if false → echo prints "i = ${i}"` };
    }
  },
  {
    code: `for i in {1..10}; do\n  f=0\n  if ((i % 3 == 0)); then\n    f=1\n    continue    # f=1 set but next iter resets to 0!\n  fi\n  if [[ $f -eq 1 && $i -gt 5 ]]; then\n    continue\n  fi\n  echo '***'\ndone`,
    range: [1,10],
    run(i) {
      let f = 0;
      if (i % 3 === 0) return { action:"continued", msg:`i=${i} → f=0 set → i%3==0 true → f=1, continue! (f wapas 0 hoga next iter)` };
      if (f === 1 && i > 5) return { action:"continued", msg:`i=${i} → second if true → continue` };
      return { action:"printed", out:"***", msg:`i=${i} → f=0 (always!) → dono if false → echo prints ***` };
    }
  },
  {
    code: `for i in {1..10}; do\n  f=1\n  if ((i % 3 == 0)); then\n    f=0\n    continue\n  fi\n  if [[ $f -eq 1 && $i -gt 5 ]]; then\n    continue    # f always 1 here, so i>5 matters!\n  fi\n  echo '***'\ndone`,
    range: [1,10],
    run(i) {
      let f = 1;
      if (i % 3 === 0) return { action:"continued", msg:`i=${i} → f=1 set → i%3==0 true → f=0, continue!` };
      if (f === 1 && i > 5) return { action:"continued", msg:`i=${i} → f=1 (always!) & i>5 → second continue! Yahi trick hai.` };
      return { action:"printed", out:"***", msg:`i=${i} → f=1 but i≤5 → second if false → echo prints ***` };
    }
  }
];

let cur = 0, step = -1, outputLines = [], printCount = 0, done = false;

function setScenario(idx) {
  cur = idx;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  resetAll();
}

function resetAll() {
  step = -1; outputLines = []; printCount = 0; done = false;
  const s = scenarios[cur];
  document.getElementById('code-area').textContent = s.code;
  const area = document.getElementById('iter-area');
  area.innerHTML = '';
  for (let i = s.range[0]; i <= s.range[1]; i++) {
    const b = document.createElement('div');
    b.className = 'iter-box'; b.id = `b${i}`; b.textContent = i;
    area.appendChild(b);
  }
  document.getElementById('output').textContent = '';
  document.getElementById('counter').textContent = '';
  document.getElementById('status').className = 'status-msg';
  document.getElementById('status').textContent = 'Click "Next step" to start';
  document.getElementById('btn-next').disabled = false;
}

function nextStep() {
  if (done) return;
  const s = scenarios[cur];
  step++;
  const i = s.range[0] + step;
  if (i > s.range[1]) { finish(); return; }

  document.querySelectorAll('.iter-box').forEach(b => b.classList.remove('active'));
  const box = document.getElementById(`b${i}`);
  box.classList.add('active');

  const r = s.run(i);
  setTimeout(() => {
    box.classList.remove('active');
    box.classList.add(r.action);
    const st = document.getElementById('status');
    st.textContent = r.msg;
    st.className = 'status-msg s-' + (r.action === 'printed' ? 'print' : r.action === 'continued' ? 'continue' : 'break');

    if (r.out) {
      printCount++;
      outputLines.push(r.out);
      document.getElementById('output').textContent = outputLines.join('\n');
    }
    document.getElementById('counter').textContent = `Lines printed so far: ${printCount}`;

    if (r.action === 'broken') {
      for (let j = i+1; j <= s.range[1]; j++) {
        document.getElementById(`b${j}`).classList.add('unreached');
      }
      finish();
    }
    if (i >= s.range[1]) finish();
  }, 250);
}

function finish() {
  done = true;
  document.getElementById('btn-next').disabled = true;
  const st = document.getElementById('status');
  st.className = 'status-msg s-done';
  st.textContent = `Done! Total lines printed: ${printCount}`;
}

resetAll();
</script>
</html>
